<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - STAR-DOC</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- TailwindCSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#050505',
                        'dark-surface': '#0f172a'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body class="text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Main Card -->
    <div class="max-w-md w-full glass-panel rounded-3xl p-8 text-center relative overflow-hidden">
        <!-- Floating shapes -->
        <div class="absolute -top-10 -left-10 w-24 h-24 bg-primary/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -right-10 w-24 h-24 bg-secondary/10 rounded-full blur-2xl"></div>

        <!-- Connection Icon -->
        <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-primary/20 to-secondary/20 border border-white/10 rounded-2xl flex items-center justify-center shadow-lg relative">
            <i class="bi bi-wifi-off text-4xl text-gray-400 animate-pulse"></i>
            <span class="absolute top-2 right-2 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-dark-surface animate-ping"></span>
            <span class="absolute top-2 right-2 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-dark-surface"></span>
        </div>

        <h1 class="text-2xl font-black mb-3">Modo Sin Conexión</h1>
        <p class="text-sm text-gray-400 mb-6 leading-relaxed">
            Parece que has perdido la conexión a internet. STAR-DOC ha entrado en modo seguro sin conexión para proteger tus datos de navegación.
        </p>

        <!-- Dynamic indicators or info -->
        <div class="bg-black/30 border border-white/5 rounded-2xl p-4 mb-6 text-left text-xs font-mono text-gray-300 space-y-2">
            <div class="flex justify-between items-center">
                <span class="text-gray-500">Estado local:</span>
                <span class="text-warning font-semibold flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-warning rounded-full animate-ping"></span>
                    Esperando red
                </span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-500">Seguridad:</span>
                <span class="text-success font-semibold">Cifrado activo</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-500">Página Offline:</span>
                <span class="text-cyan-400">sw-cache-v1</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="space-y-3">
            <button onclick="window.location.reload()" class="btn btn-primary w-full bg-gradient-to-r from-primary to-accent border-none text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.99] transition-all">
                <i class="bi bi-arrow-clockwise"></i> Reintentar Conexión
            </button>
            <button onclick="window.location.href='/home'" class="btn btn-ghost w-full border border-white/10 text-gray-300 hover:bg-white/5 rounded-xl">
                <i class="bi bi-house"></i> Ir al Inicio Guardado
            </button>
        </div>
        
        <p class="mt-6 text-[10px] text-gray-600 font-mono">STAR-DOC Suite Legal &copy; 2026</p>
    </div>

    <script>
        // Escuchar el evento online del navegador para redirigir automáticamente cuando vuelva el internet
        window.addEventListener('online', () => {
            console.log("Conexión restablecida. Redirigiendo...");
            // Si hay un historial de página anterior, volver allí, de lo contrario a /home
            if (document.referrer && !document.referrer.includes('/offline')) {
                window.location.href = document.referrer;
            } else {
                window.location.href = '/home';
            }
        });
    </script>
</body>

</html>
