<!-- Modal Certificado Legal (Glassmorphism de alta gama) -->
<div id="certificate_modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[1100] flex items-center justify-center hidden" style="opacity: 0; transition: opacity 0.3s ease;">
    <div class="bg-white/95 backdrop-blur-2xl border border-white/20 w-11/12 max-w-4xl h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden relative transform scale-95 transition-transform duration-300 ease-out" id="cert-modal-card">
        <!-- Header -->
        <div class="bg-gray-50/50 border-b border-gray-200/50 p-4 flex justify-between items-center shrink-0">
            <h3 class="font-bold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Certificado de Evidencia Criptográfica IPFS
            </h3>
            <div class="flex items-center gap-2">
                <button onclick="printCertificate()" class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1.5 transition-all focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 00-2 2h2m2 4h10a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4h6z" />
                    </svg>
                    Imprimir
                </button>
                <button onclick="closeCertificateModal()" class="text-gray-400 hover:bg-gray-200 hover:text-gray-800 p-1.5 rounded-lg transition-colors focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
        <!-- Iframe para mostrar el certificado -->
        <div class="flex-1 bg-gray-50/50">
            <iframe id="cert-iframe" class="w-full h-full border-none bg-white"></iframe>
        </div>
    </div>
</div>
