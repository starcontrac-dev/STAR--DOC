<!-- Modal Formulario de Datos de Plantilla (Glassmorphism Premium Wizard) -->
<div x-show="fieldsModal.isOpen" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[1150] flex items-center justify-center animate-fade-in" style="display: none;" @click.away="fieldsModal.isOpen = false">
    <div class="bg-black/85 backdrop-blur-2xl border border-white/10 w-11/12 max-w-lg rounded-2xl shadow-2xl flex flex-col max-h-[90vh] transform scale-100 transition-all duration-300 overflow-hidden" @click.stop>
        <!-- Header -->
        <div class="bg-white/5 border-b border-white/10 p-5 flex justify-between items-center shrink-0">
            <h3 class="font-bold text-white flex items-center gap-2 text-base sm:text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span>Asistente de Redacción Guiada</span>
            </h3>
            <button @click="fieldsModal.isOpen = false" class="text-gray-400 hover:text-white p-1.5 rounded-lg hover:bg-white/5 transition-colors focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Barra de Pasos (DaisyUI Steps) -->
        <template x-if="fieldsModal.steps && fieldsModal.steps.length > 1">
            <div class="px-5 py-3 bg-white/5 border-b border-white/10 shrink-0 overflow-x-auto custom-scrollbar select-none">
                <ul class="steps w-full">
                    <template x-for="step in fieldsModal.steps" :key="step.id">
                        <li class="step text-[9px] sm:text-[10px] font-bold tracking-wider uppercase transition-all duration-300 cursor-pointer"
                            :class="step.id <= fieldsModal.currentStep ? 'step-primary text-cyan-400' : 'text-gray-500'"
                            x-text="step.name"
                            @click="if(step.id < fieldsModal.currentStep) { goToFieldsModalStep(step.id) }"></li>
                    </template>
                </ul>
            </div>
        </template>
        
        <!-- Body / Form Fields -->
        <div class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar text-left">
            <div class="mb-2">
                <p class="text-xs text-gray-400">
                    Plantilla: <span class="font-semibold text-cyan-400" x-text="fieldsModal.templateName"></span>. Completa los datos en los siguientes pasos lógicos.
                </p>
            </div>
            
            <template x-if="!fieldsModal.fields || fieldsModal.fields.length === 0">
                <div class="p-6 text-center text-gray-500 text-sm">
                    No se detectaron variables dinámicas en esta plantilla.
                </div>
            </template>
            
            <form @submit.prevent="submitFieldsModal(true)" class="space-y-4">
                <template x-for="step in fieldsModal.steps" :key="step.id">
                    <div x-show="fieldsModal.currentStep === step.id"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 translate-x-8"
                         x-transition:enter-end="opacity-100 translate-x-0"
                         class="space-y-4">
                        
                        <!-- Si es un paso de entrada normal -->
                        <template x-if="!step.isReview">
                            <div class="space-y-4">
                                <template x-for="field in step.fields" :key="field.name">
                                    <div class="space-y-1.5" x-show="isFieldVisible(field)" x-transition>
                                        <label class="block text-xs font-bold text-gray-300 uppercase tracking-wider flex justify-between items-center">
                                            <span x-text="field.label"></span>
                                            <span class="text-[9px] text-gray-500 font-normal lowercase" x-text="`(${field.name})`"></span>
                                        </label>
                                        
                                        <!-- Textarea -->
                                        <template x-if="field.type === 'textarea'">
                                            <textarea x-model="fieldsModal.values[field.name]" :placeholder="field.placeholder" 
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all custom-scrollbar" 
                                                rows="3"></textarea>
                                        </template>
                                        
                                        <!-- Select / Dropdown -->
                                        <template x-if="field.type === 'select' || field.type === 'dropdown'">
                                            <select x-model="fieldsModal.values[field.name]"
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all">
                                                <option value="" class="bg-black text-gray-400">Selecciona una opción...</option>
                                                <template x-for="opt in field.options" :key="opt">
                                                    <option :value="opt" class="bg-black text-white" x-text="opt"></option>
                                                </template>
                                            </select>
                                        </template>
                                        
                                        <!-- Date -->
                                        <template x-if="field.type === 'date'">
                                            <input type="date" x-model="fieldsModal.values[field.name]" 
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all scheme-dark" />
                                        </template>
                                        
                                        <!-- Email -->
                                        <template x-if="field.type === 'email'">
                                            <input type="email" x-model="fieldsModal.values[field.name]" :placeholder="field.placeholder" 
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all" />
                                        </template>
                                        
                                        <!-- Teléfono -->
                                        <template x-if="field.type === 'tel'">
                                            <input type="tel" x-model="fieldsModal.values[field.name]" :placeholder="field.placeholder" 
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all" />
                                        </template>
                                        
                                        <!-- Number -->
                                        <template x-if="field.type === 'number'">
                                            <input type="number" step="any" x-model="fieldsModal.values[field.name]" :placeholder="field.placeholder" 
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all" />
                                        </template>
                                        
                                        <!-- Default Text Input -->
                                        <template x-if="field.type !== 'textarea' && field.type !== 'select' && field.type !== 'dropdown' && field.type !== 'date' && field.type !== 'email' && field.type !== 'tel' && field.type !== 'number'">
                                            <input type="text" x-model="fieldsModal.values[field.name]" :placeholder="field.placeholder" 
                                                class="w-full px-3.5 py-2 text-sm bg-white/5 border border-white/10 hover:border-white/20 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-xl outline-none text-white transition-all" />
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                        
                        <!-- Si es el paso de revisión final -->
                        <template x-if="step.isReview">
                            <div class="space-y-4">
                                <div class="p-3 bg-cyan-950/20 border border-cyan-500/20 rounded-xl text-xs text-cyan-200">
                                    Por favor, revisa todos los datos ingresados antes de redactar el documento con la IA.
                                </div>
                                <div class="border border-white/10 rounded-xl overflow-hidden max-h-[300px] overflow-y-auto custom-scrollbar">
                                    <table class="w-full text-xs text-left">
                                        <thead class="bg-white/5 text-gray-400 font-bold border-b border-white/10 select-none">
                                            <tr>
                                                <th class="p-3">Variable</th>
                                                <th class="p-3">Valor Ingresado</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-white/5">
                                            <template x-for="f in fieldsModal.fields" :key="f.name">
                                                <tr class="hover:bg-white/5 transition-colors" x-show="isFieldVisible(f)">
                                                    <td class="p-3 font-semibold text-gray-300" x-text="f.label"></td>
                                                    <td class="p-3 text-white truncate max-w-[200px]">
                                                        <span x-text="fieldsModal.values[f.name] || '(no especificado)'" 
                                                              :class="!fieldsModal.values[f.name] ? 'text-gray-500 italic' : ''"></span>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </form>
        </div>
        
        <!-- Footer -->
        <div class="bg-white/5 border-t border-white/10 p-4 flex flex-col sm:flex-row justify-between items-center gap-2 shrink-0">
            <!-- Botón Cancelar o Atrás -->
            <div class="flex gap-2 w-full sm:w-auto justify-start">
                <button type="button" @click="fieldsModal.isOpen = false"
                    class="w-1/2 sm:w-auto px-4 py-2 bg-white/5 text-gray-300 hover:text-white rounded-xl text-xs font-bold border border-white/10 hover:bg-white/10 transition-colors">
                    Cancelar
                </button>
                <button type="button" @click="prevFieldsModalStep()" x-show="fieldsModal.currentStep > 1"
                    class="w-1/2 sm:w-auto px-4 py-2 bg-white/5 text-gray-300 hover:text-white rounded-xl text-xs font-bold border border-white/10 hover:bg-white/10 transition-colors flex items-center justify-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                    Atrás
                </button>
            </div>
            
            <!-- Botón Siguiente o Confirmar -->
            <div class="w-full sm:w-auto">
                <!-- Botón Siguiente -->
                <button type="button" @click="nextFieldsModalStep()" x-show="fieldsModal.currentStep < fieldsModal.totalSteps"
                    class="px-5 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-xl text-xs font-bold transition-all shadow-md active:scale-95 flex items-center justify-center gap-1 w-full">
                    Siguiente
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                
                <!-- Botones Finales de Envío -->
                <div x-show="fieldsModal.currentStep === fieldsModal.totalSteps" class="flex gap-2 w-full">
                    <button type="button" @click="submitFieldsModal(false)"
                        class="w-1/2 sm:w-auto px-4 py-2 bg-indigo-600/30 hover:bg-indigo-600/50 text-indigo-200 hover:text-indigo-100 rounded-xl text-xs font-bold border border-indigo-500/30 transition-colors">
                        ✍️ Solo Pegar
                    </button>
                    <button type="button" @click="submitFieldsModal(true)"
                        class="w-1/2 sm:w-auto px-4 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-xl text-xs font-bold transition-all shadow-md active:scale-95 flex items-center justify-center gap-1">
                        🚀 Enviar e Iniciar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
