{% extends "base.html" %}

{% block title %}Restablecer Contraseña - Star-Doc{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="card w-full max-w-md glass-panel shadow-2xl animate-fade-in">
        <div class="card-body p-8">
            <div class="text-center mb-6">
                <div class="mb-4 flex flex-col items-center">
                    <img src="/static/favicon.ico" alt="StarContract Logo"
                        class="w-16 h-16 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                </div>
                <h2 class="text-3xl font-bold font-mono tracking-tight text-white">Nueva Contraseña</h2>
                <p class="text-base-content/60 mt-2">Crea una contraseña segura para tu cuenta</p>
            </div>

            <form id="reset-password-form" class="flex flex-col gap-4">
                <input type="hidden" id="token" name="token" value="{{ token }}">
                
                <div class="form-control">
                    <label class="label">
                        <span class="label-text text-white/70">Nueva Contraseña</span>
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/30">
                            <i class="bi bi-shield-lock"></i>
                        </span>
                        <input type="password" id="new_password" name="new_password" placeholder="••••••••"
                            class="input input-bordered w-full pl-10 bg-black/20 focus:border-primary transition-all duration-300" 
                            required autofocus />
                    </div>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text text-white/70">Confirmar Contraseña</span>
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/30">
                            <i class="bi bi-shield-check"></i>
                        </span>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••"
                            class="input input-bordered w-full pl-10 bg-black/20 focus:border-primary transition-all duration-300" 
                            required />
                    </div>
                    <label class="label" id="validation-msg" class="hidden">
                        <span class="label-text-alt text-error text-xs">Las contraseñas no coinciden</span>
                    </label>
                </div>

                <div id="message-container"></div>

                <div class="form-control mt-4">
                    <button type="submit" id="submit-btn"
                        class="btn btn-primary bg-gradient-to-r from-primary to-secondary border-none hover:shadow-lg hover:shadow-primary/40 text-white transition-all duration-500">
                        <span class="loading loading-spinner loading-sm hidden" id="spinner"></span>
                        Cambiar Contraseña
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const form = document.getElementById('reset-password-form');
    const container = document.getElementById('message-container');
    const submitBtn = document.getElementById('submit-btn');
    const spinner = document.getElementById('spinner');
    const newPass = document.getElementById('new_password');
    const confirmPass = document.getElementById('confirm_password');
    const validationMsg = document.getElementById('validation-msg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (newPass.value !== confirmPass.value) {
            validationMsg.classList.remove('hidden');
            return;
        }
        validationMsg.classList.add('hidden');
        
        // UI State
        submitBtn.disabled = true;
        spinner.classList.remove('hidden');
        container.innerHTML = '';

        const payload = {
            token: document.getElementById('token').value,
            new_password: newPass.value
        };

        try {
            const response = await fetch('/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                container.innerHTML = `
                    <div role="alert" class="alert alert-success text-sm py-4 mt-2 bg-success/10 text-success border-success/20 animate-slide-up">
                        <i class="bi bi-check-circle-fill"></i>
                        <span>${data.message} Redirigiendo...</span>
                    </div>`;
                setTimeout(() => window.location.href = '/login', 2500);
            } else {
                throw new Error(data.detail || 'Error al restablecer la contraseña');
            }
        } catch (error) {
            container.innerHTML = `
                <div role="alert" class="alert alert-error text-sm py-4 mt-2 bg-error/10 text-error border-error/20 animate-shake">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>${error.message}</span>
                </div>`;
            submitBtn.disabled = false;
        } finally {
            spinner.classList.add('hidden');
        }
    });
</script>

<style>
    @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
    .animate-slide-up { animation: slide-up 0.4s ease-out forwards; }
    .animate-shake { animation: shake 0.3s ease-in-out 2; }
    
    .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #validation-msg.hidden { display: none; }
</style>
{% endblock %}
